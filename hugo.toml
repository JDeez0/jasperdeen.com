baseURL = "https://jasperdeen.com/"
languageCode = "en-us"
title = "Jasper H. Deen"
theme = "quint"

enableGitInfo = true
paginate = 10

[build]
  renderStatic = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[params]
  description = "Developer, writer, and student."
  author = "Jasper H. Deen"
  email = "jasperdeen@gmail.com"
  github = "JDeez0"
  intro = "Developer, writer, and student."
  subtitle = "Developer, writer, and student."

  enableSearch = true
  enableImageBanner = true
  showReadingTime = true
  defaultTheme = "auto"
  numImages = 10

  css = ["css/custom.css"]

[[params.social]]
  name = "GitHub"
  url = "https://github.com/JDeez0"
  icon = "/social/github.svg"

[[params.social]]
  name = "X"
  url = "https://x.com"
  icon = "/social/x.svg"

[[params.social]]
  name = "Instagram"
  url = "https://instagram.com"
  icon = "/social/instagram.svg"

[[params.social]]
  name = "Email"
  url = "mailto:jasperdeen@gmail.com"
  icon = "/social/email.png"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
